<!DOCTYPE html>
<html lang="ja">
<head>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.ticker{background:var(--amber-lt); ... }
.page-header{padding:32px 32px 0;max-width:1100px;margin:0 auto}
.page-header h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.page-header p{font-size:13px;color:var(--muted)}

.controls{padding:20px 32px 0;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:12px}

.search-wrap{position:relative}
.search-input{width:100%;padding:11px 16px 11px 42px;border:2px solid var(--black);border-radius:999px;font-family:inherit;font-size:13px;font-weight:700;background:var(--white);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--pink)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted)}

.tag-row{display:flex;gap:8px;flex-wrap:wrap}
.tag-btn{padding:6px 16px;border-radius:999px;border:2px solid var(--black);background:var(--white);font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;white-space:nowrap}
.tag-btn.active{color:var(--white)}
.tag-btn[data-tag="すべて"].active{background:var(--black)}
.tag-btn[data-tag="行事"].active{background:var(--pink);border-color:var(--pink)}
.tag-btn[data-tag="講演"].active{background:var(--teal);border-color:var(--teal)}
.tag-btn[data-tag="異能発掘"].active{background:var(--amber);border-color:var(--amber)}
.tag-btn[data-tag="部活"].active{background:var(--blue);border-color:var(--blue)}
.tag-btn[data-tag="自治"].active{background:var(--pink-lt);border-color:var(--pink-lt);color:var(--black)}
.tag-btn[data-tag="スキル"].active{background:var(--teal-lt);border-color:var(--teal-lt);color:var(--black)}

.sort-row{display:flex;gap:8px;align-items:center}
.sort-label{font-size:12px;color:var(--muted);font-weight:700}
.sort-btn{padding:4px 12px;border-radius:999px;border:1.5px solid var(--black);background:var(--white);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.sort-btn.active{background:var(--black);color:var(--white)}

.result-info{font-size:12px;color:var(--muted);font-weight:700;padding:16px 32px 0;max-width:1100px;margin:0 auto}

.news-grid{padding:16px 32px 40px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.news-card{background:var(--white);border:2px solid var(--black);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .15s;display:flex;flex-direction:column}
.news-card:hover{transform:translateY(-3px)}
.news-card.featured{grid-column:span 2}
.card-accent{height:5px}
.card-body{padding:16px;flex:1;display:flex;flex-direction:column}
.card-tag{font-size:10px;font-weight:800;padding:2px 10px;border-radius:999px;border:1.5px solid currentColor;width:fit-content;margin-bottom:10px}
.card-title{font-size:14px;font-weight:800;line-height:1.45;margin-bottom:8px;flex:1}
.news-card.featured .card-title{font-size:17px}
.card-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.card-author{font-weight:700}
.card-dot{width:3px;height:3px;background:var(--muted);border-radius:50%}
.card-img-placeholder{height:130px;display:flex;align-items:center;justify-content:center;font-size:36px;border-bottom:2px solid var(--black)}

.empty{padding:60px 32px;text-align:center;color:var(--muted)}
.empty p{font-size:14px;font-weight:700;margin-bottom:6px}
.empty small{font-size:12px}

footer{background:var(--black);color:var(--white);padding:24px 32px;display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-size:14px;font-weight:800}
.footer-sub{font-size:11px;opacity:.5;margin-top:3px}

@media(max-width:700px){
  nav{padding:0 16px}.nav-links{display:none}
  .page-header,.controls,.result-info{padding-left:16px;padding-right:16px}
  .news-grid{grid-template-columns:1fr;padding:16px 16px 32px}
  .news-card.featured{grid-column:span 1}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="logo-dots">
      <div class="logo-dot" style="background:var(--pink)"></div>
      <div class="logo-dot" style="background:var(--teal)"></div>
      <div class="logo-dot" style="background:var(--amber)"></div>
    </div>
<a href="index.html" style="text-decoration: none; color: inherit;">Oshukan Portal</a>  </div>
  <ul class="nav-links">
      <li><a href="oshukan_news_list.html" class="active">ニュース</a></li>
    <li><a href="oshukan_events_page.html">行事</a></li>
    <li><a href="oshukan_clubs_page.html">部活</a></li>
    <li><a href="oshukan_talks_page.html">講演</a></li>
    <li><a href="oshukan_about_page.html">広報部</a></li>
  </ul>
  <button class="nav-cta">お知らせ登録</button>
</nav>

<div class="page-header">
  <h1>ニュース・記事一覧</h1>
  <p>広報部が届ける、桜修館のいまとリアル。</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="記事を検索...">
  </div>
  <div class="tag-row" id="tagRow">
    <button class="tag-btn active" data-tag="すべて">すべて</button>
    <button class="tag-btn" data-tag="行事" style="--c:var(--pink)">🎉 行事</button>
    <button class="tag-btn" data-tag="講演" >🎤 講演</button>
    <button class="tag-btn" data-tag="異能発掘">✨ 異能発掘</button>
    <button class="tag-btn" data-tag="部活">🏅 部活</button>
    <button class="tag-btn" data-tag="自治">🗳️ 自治</button>
    <button class="tag-btn" data-tag="スキル">🛠️ スキル</button>
  </div>
  <div class="sort-row">
    <span class="sort-label">並び替え：</span>
    <button class="sort-btn active" data-sort="new">新着順</button>
    <button class="sort-btn" data-sort="old">古い順</button>
  </div>
</div>

<div class="result-info" id="resultInfo"></div>

<div class="news-grid" id="grid"></div>

<footer>
  <div>
    <div class="footer-logo">Oshukan Portal</div>
    <div class="footer-sub">桜修館中等教育学校 生徒会広報部 運営</div>
  </div>
</footer>

<script>
const TAG_COLORS={
  '行事':{color:'var(--pink)',bg:'var(--pink-lt)'},
  '講演':{color:'var(--teal)',bg:'var(--teal-lt)'},
  '異能発掘':{color:'var(--amber)',bg:'var(--amber-lt)'},
  '部活':{color:'var(--blue)',bg:'#E6F1FB'},
  '自治':{color:'var(--pink)',bg:'var(--pink-lt)'},
  'スキル':{color:'var(--teal)',bg:'var(--teal-lt)'},
};
const TAG_ICONS={'行事':'🎉','講演':'🎤','異能発掘':'✨','部活':'🏅','自治':'🗳️','スキル':'🛠️'};

const ARTICLES=[
  {id:1,tag:'行事',title:'記念祭テーマ「RPG」決定！各クラスの出し物を一挙公開',author:'記念祭幹部',date:'2026-05-24',featured:true,emoji:'🎊'},
  {id:2,tag:'講演',title:'第1回講師リクエスト集計結果を発表。1位はあの起業家！',author:'広報部',date:'2026-05-23',featured:false,emoji:'🎤'},
  {id:3,tag:'部活',title:'サッカー部 県大会ベスト8！キャプテンに直撃インタビュー',author:'広報部',date:'2026-05-22',featured:false,emoji:'⚽'},
  {id:4,tag:'異能発掘',title:'AIでオリジナル楽曲をつくる2年生・田中さんに聞いてみた',author:'広報部',date:'2026-05-21',featured:false,emoji:'🎵'},
  {id:5,tag:'自治',title:'6月自治会議会まとめ：校則改正案が提出されました',author:'自治会',date:'2026-05-20',featured:false,emoji:'📋'},
  {id:6,tag:'スキル',title:'iPadノート術 完全ガイド｜広報部テック班が伝授します',author:'広報部',date:'2026-05-19',featured:false,emoji:'📱'},
  {id:7,tag:'行事',title:'体育祭2026 競技種目・チーム分けが発表されました',author:'クラスマッチ幹部',date:'2026-05-18',featured:false,emoji:'🏃'},
  {id:8,tag:'講演',title:'卒業生・山田さん（東大医学部）が語る「桜修館で得たもの」',author:'進路部・広報部',date:'2026-05-16',featured:false,emoji:'🎓'},
  {id:9,tag:'異能発掘',title:'放課後に天体望遠鏡を自作していた3年生を発見した',author:'広報部',date:'2026-05-14',featured:false,emoji:'🔭'},
  {id:10,tag:'部活',title:'合唱部が全国大会へ！練習密着レポート48時間',author:'広報部',date:'2026-05-12',featured:false,emoji:'🎶'},
  {id:11,tag:'スキル',title:'ChatGPTで英作文の精度を爆上げする使い方【実例あり】',author:'広報部',date:'2026-05-10',featured:false,emoji:'🤖'},
  {id:12,tag:'自治',title:'広報部1期生、始動しました。これからよろしくお願いします',author:'広報部',date:'2026-05-01',featured:false,emoji:'📣'},
];

let currentTag='すべて';
let currentSort='new';
let currentSearch='';

function fmt(d){const dt=new Date(d);return`${dt.getMonth()+1}月${dt.getDate()}日`}

function render(){
  let list=[...ARTICLES];
  if(currentTag!=='すべて') list=list.filter(a=>a.tag===currentTag);
  if(currentSearch) list=list.filter(a=>a.title.includes(currentSearch)||a.tag.includes(currentSearch));
  if(currentSort==='old') list.sort((a,b)=>a.date.localeCompare(b.date));
  else list.sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById('resultInfo').textContent=`${list.length}件の記事`;

  const grid=document.getElementById('grid');
  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><p>記事が見つかりませんでした</p><small>別のキーワードやタグで試してみてください</small></div>`;
    return;
  }

  grid.innerHTML=list.map((a,i)=>{
    const c=TAG_COLORS[a.tag]||{color:'var(--muted)',bg:'#f0f0ec'};
    const featured=i===0&&currentTag==='すべて'&&!currentSearch;
    return`<div class="news-card${featured?' featured':''}">
      ${featured?`<div class="card-img-placeholder" style="background:${c.bg}">${a.emoji}</div>`:''}
      <div class="card-accent" style="background:${c.color}"></div>
      <div class="card-body">
        <div class="card-tag" style="color:${c.color}">${TAG_ICONS[a.tag]||''} ${a.tag}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-meta">
          <span class="card-author">${a.author}</span>
          <span class="card-dot"></span>
          <span>${fmt(a.date)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('tagRow').addEventListener('click',e=>{
  const btn=e.target.closest('.tag-btn');
  if(!btn) return;
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTag=btn.dataset.tag;
  render();
});

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSort=btn.dataset.sort;
    render();
  });
});

document.getElementById('search').addEventListener('input',e=>{
  currentSearch=e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
