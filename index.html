<style>
.ticker{background:var(--amber-lt); ... }
  
/* ── TICKER ── */
.ticker{background:var(--amber-lt);border-top:2px solid var(--black);border-bottom:2px solid var(--black);padding:9px 0;overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-block;animation:ticker 20s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-block;margin-right:48px;font-size:12px;font-weight:700}
.ticker-bullet{display:inline-block;width:6px;height:6px;background:var(--pink);border-radius:50%;margin-right:8px;vertical-align:middle}

/* ── HERO ── */
.hero{padding:48px 32px 36px;display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center;max-width:1100px;margin:0 auto}
.hero-left{}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--pink-lt);border:2px solid var(--black);border-radius:999px;padding:5px 16px;font-size:12px;font-weight:800;margin-bottom:16px}
.hero-eyebrow-dot{width:7px;height:7px;background:var(--pink);border-radius:50%}
.hero h1{font-size:38px;font-weight:800;line-height:1.15;letter-spacing:-1px;margin-bottom:12px}
.hero h1 em{font-style:normal;color:var(--pink)}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:11px 22px;border-radius:999px;border:2px solid var(--black);font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--pink);color:var(--white)}
.btn-secondary{background:var(--white);color:var(--black)}
.hero-right{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-stat{background:var(--white);border:2px solid var(--black);border-radius:var(--radius);padding:16px;text-align:center}
.hero-stat-num{font-size:28px;font-weight:800;line-height:1}
.hero-stat-label{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px}
.hero-stat.accent{background:var(--pink);color:var(--white)}
.hero-stat.accent .hero-stat-label{color:rgba(255,255,255,.75)}

/* ── SECTION ── */
.section{padding:0 32px 40px;max-width:1100px;margin:0 auto}
.section-head {display: flex;justify-content: space-between;align-items: baseline;margin-bottom: 16px;}
.section-title{font-size:13px;font-weight:800;letter-spacing:.5px}
.section-title-bar{display:inline-block;width:4px;height:14px;border-radius:2px;margin-right:8px;vertical-align:middle}
.see-all{font-size:12px;color:var(--muted);font-weight:700;text-decoration:none;border-bottom:1.5px solid var(--muted);padding-bottom:1px}

/* --- NEWS CARDS (一覧表示用) --- */
.news-scroll {display: grid;grid-template-columns: repeat(3, 1fr); /* 強制的に3列にする */gap: 20px; /* カードの隙間 */margin-bottom: 32px;overflow: visible; /* スクロール機能を完全にオフにする */}
.news-card {width: 100% !important; /* 横幅をグリッドに合わせる */min-width: 0 !important; /* 横スクロール用の制限を解除 */flex-shrink: 1;background: var(--white);border: 2px solid var(--black);border-radius: var(--radius);overflow: hidden;cursor: pointer;transition: transform .15s;display: flex;flex-direction: column;}
/* スマホでは1列にする */
@media (max-width: 768px) {.news-scroll {grid-template-columns: 1fr; /* 1列にする */}}
.news-card:hover{transform:translateY(-3px)}
.news-card-top{height:5px}
.news-card-body{padding:14px}
.news-tag{font-size:10px;font-weight:800;padding:2px 9px;border-radius:999px;border:1.5px solid currentColor;width:fit-content;margin-bottom:8px}
.news-card h3{font-size:13px;font-weight:700;line-height:1.45;margin-bottom:6px}
.news-meta{font-size:11px;color:var(--muted)}

/* ── 3-COL FEATURE ── */
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.feature-card{background:var(--white);border:2px solid var(--black);border-radius:var(--radius);padding:18px;cursor:pointer;transition:transform .15s}
.feature-card:hover{transform:translateY(-3px)}
.feature-icon-wrap{width:40px;height:40px;border-radius:10px;border:2px solid var(--black);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.feature-card h3{font-size:14px;font-weight:800;margin-bottom:5px}
.feature-card p{font-size:12px;color:var(--muted);line-height:1.55}
.feature-arrow{margin-top:12px;font-size:12px;font-weight:800;color:var(--muted)}

/* ── COLOR PALETTE STRIP ── */
.palette-strip{display:flex;gap:0;border:2px solid var(--black);border-radius:var(--radius);overflow:hidden;height:44px;margin-bottom:40px}
.palette-swatch{flex:1}

/* ── PILLARS ── */
.pillars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pillar-card{border:2px solid var(--black);border-radius:var(--radius);padding:18px;cursor:pointer;transition:transform .15s}
.pillar-card:hover{transform:translateY(-3px)}
.pillar-badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 12px;border-radius:999px;border:2px solid var(--black);margin-bottom:10px}
.pillar-card h3{font-size:14px;font-weight:800;margin-bottom:6px}
.pillar-card p{font-size:12px;line-height:1.55;opacity:.75}

/* ── FOOTER ── */
footer{background:var(--black);color:var(--white);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.footer-logo{font-size:14px;font-weight:800}
.footer-sub{font-size:11px;opacity:.5;margin-top:3px}
.footer-links{display:flex;gap:20px}
.footer-links a{color:rgba(255,255,255,.6);font-size:12px;font-weight:700;text-decoration:none}

@media(max-width:680px) {
  /* ヒーローエリア全体の余白を調整 */
  .hero {
    padding: 40px 16px !important; 
    grid-template-columns: 1fr !important;
    display: flex !important;
    flex-direction: column;
    gap: 32px;
  }

  /* キャッチコピーを大きく、幅広に */
  .hero h1 {
    font-size: 38px !important; /* さらに大きく */
    line-height: 1.2 !important;
    margin-bottom: 16px !important;
    width: 100% !important; /* 横幅いっぱい使う */
    letter-spacing: -1.5px !important; /* 字間を詰めて迫力を出す */
    white-space: normal; /* 折り返しを許可 */
  }

  .hero p {
    font-size: 16px !important;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  /* --- 統計ゾーン：image_92997a.png の再現 --- */
  .hero-right {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important; /* 2列に戻す */
    gap: 12px !important;
    width: 100% !important;
  }

  /* 統計ボックスの個別調整 */
  .stat-card {
    padding: 16px !important;
    text-align: center;
    border: 2px solid var(--black) !important;
    border-radius: 16px !important;
    background: var(--white);
  }

  /* 「記念祭まであと」などの大きな数字用カード（もしあれば） */
  .stat-card.featured {
    grid-column: span 2 !important; /* 記念祭だけは1列ぶち抜き */
  }

  .stat-num {
    font-size: 24px !important;
  }

  .stat-label {
    font-size: 11px !important;
  }

  /* ニューススクロールも1列に */
  .news-scroll {
    grid-template-columns: 1fr !important;
    gap: 16px;
  }
}
@media(max-width:680px) {
  /* --- 既存の設定の下に追加してください --- */

  /* 1. コンテンツ（行事・部活など）のグリッドを縦1列にする */
  .feature-grid {
    grid-template-columns: 1fr !important; /* 強制的に1列 */
    gap: 16px;
  }

  /* 2. 広報部の三本柱を縦1列にする */
  .pillars-grid {
    grid-template-columns: 1fr !important; /* 強制的に1列 */
    gap: 20px;
  }

  /* ついでに各カードの中の文字も見やすく調整 */
  .pillar-card, .feature-card {
    padding: 24px !important;
  }
}

<script>
  const menu = document.getElementById('mobile-menu');
  const navList = document.querySelector('.nav-links');

  menu.addEventListener('click', () => {
    menu.classList.toggle('is-active');
    navList.classList.toggle('active');
  });

  // メニュー以外をクリックしたら閉じる
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && !navList.contains(e.target)) {
      menu.classList.remove('is-active');
      navList.classList.remove('active');
    }
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const menuBtn = document.getElementById('mobile-menu');
    const navLinks = document.querySelector('.nav-links');

    if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            this.classList.toggle('is-active');
            navLinks.classList.toggle('active');
        });

        // メニュー以外の場所をタップしたら閉じる
        document.addEventListener('click', function(e) {
            if (!navLinks.contains(e.target) && !menuBtn.contains(e.target)) {
                menuBtn.classList.remove('is-active');
                navLinks.classList.remove('active');
            }
        });
    }
});
</script>

        function updateStats() {
            // ① 文化祭カウントダウン
            const targetDate = new Date('2026-09-05'); // 文化祭の日付をここに
            const today = new Date();
            const diff = targetDate - today;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            const daysElement = document.getElementById('days-left');
            if (daysElement) {
                daysElement.innerText = days > 0 ? days : 0;
            }

            // ② 記事数を自動で数える（ニュースカードの数を数える）
            // .news-card のクラスがついた要素がいくつあるか数えます
            const newsCount = document.querySelectorAll('.news-card').length;
            // 「今週の新着記事」の数字の場所にも id="news-count" をつければ自動化できます！
            const newsElement = document.getElementById('news-count');
            if (newsElement) {
                newsElement.innerText = newsCount;
            }
        }

        // ページが読み込まれたら実行
        window.onload = updateStats;
</script>

        const diff = f1Reset - todayReset;
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

        if (todayReset.getTime() === f1Reset.getTime()) {
            // 記念祭 1日目
            daysElement.innerText = "1日目";
            labelElement.innerText = "記念祭 本日開催！";
            specialArea.style.display = "block"; // 特設サイトへの案内を表示

            // 記念祭 2日目
            daysElement.innerText = "2日目";
            labelElement.innerText = "記念祭 最終日！";
            specialArea.style.display = "block";
        } else if (days > 0) {
            // 開催前（カウントダウン）
            daysElement.innerText = days;

async function loadNewsFromExcel() {
    // 1. エクセルファイルを読み込む
    const response = await fetch('news_data.xlsx');
    const arrayBuffer = await response.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    const workbook = XLSX.read(data, {type: 'array'});

    // 2. 最初のシートのデータをJSON（扱いやすい形）にする
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const newsList = XLSX.utils.sheet_to_json(firstSheet);

    // 3. 画面に表示する（今のデザインに合わせて流し込む）
