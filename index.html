<script>
  const menu = document.getElementById('mobile-menu');
  const navList = document.querySelector('.nav-links');

  menu.addEventListener('click', () => {
    menu.classList.toggle('is-active');
    navList.classList.toggle('active');
  });

  // メニュー以外をクリックしたら閉じる
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && !navList.contains(e.target)) {
      menu.classList.remove('is-active');
      navList.classList.remove('active');
    }
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const menuBtn = document.getElementById('mobile-menu');
    const navLinks = document.querySelector('.nav-links');

    if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            this.classList.toggle('is-active');
            navLinks.classList.toggle('active');
        });

        // メニュー以外の場所をタップしたら閉じる
        document.addEventListener('click', function(e) {
            if (!navLinks.contains(e.target) && !menuBtn.contains(e.target)) {
                menuBtn.classList.remove('is-active');
                navLinks.classList.remove('active');
            }
        });
    }
});
</script>

<script>
        function updateStats() {
            // ① 文化祭カウントダウン
            const targetDate = new Date('2026-09-05'); // 文化祭の日付をここに
            const today = new Date();
            const diff = targetDate - today;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            const daysElement = document.getElementById('days-left');
            if (daysElement) {
                daysElement.innerText = days > 0 ? days : 0;
            }

            // ② 記事数を自動で数える（ニュースカードの数を数える）
            // .news-card のクラスがついた要素がいくつあるか数えます
            const newsCount = document.querySelectorAll('.news-card').length;
            // 「今週の新着記事」の数字の場所にも id="news-count" をつければ自動化できます！
            const newsElement = document.getElementById('news-count');
            if (newsElement) {
                newsElement.innerText = newsCount;
            }
        }

        // ページが読み込まれたら実行
        window.onload = updateStats;
</script>
<script>
    function updateFestivalStatus() {
        const today = new Date();
        // テスト用：今日の日付を固定したい場合はここを書き換えて確認できます
        // const today = new Date('2026-09-05'); 

        const f1 = new Date('2026-09-05'); // 1日目
        const f2 = new Date('2026-09-06'); // 2日目
        
        const daysElement = document.getElementById('festival-days');
        const labelElement = document.getElementById('festival-label');
        const specialArea = document.getElementById('festival-special-area');

        // 時間を 00:00:00 に揃えて日付の差だけを計算
        const todayReset = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const f1Reset = new Date(f1.getFullYear(), f1.getMonth(), f1.getDate());
        
        const diff = f1Reset - todayReset;
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

        if (todayReset.getTime() === f1Reset.getTime()) {
            // 記念祭 1日目
            daysElement.innerText = "1日目";
            labelElement.innerText = "記念祭 本日開催！";
            specialArea.style.display = "block"; // 特設サイトへの案内を表示
        } else if (todayReset.getTime() === f2.getTime()) {
            // 記念祭 2日目
            daysElement.innerText = "2日目";
            labelElement.innerText = "記念祭 最終日！";
            specialArea.style.display = "block";
        } else if (days > 0) {
            // 開催前（カウントダウン）
            daysElement.innerText = days;
            labelElement.innerText = "記念祭まであと（日）";
        } else {
            // 終了後
            daysElement.innerText = "終";
            labelElement.innerText = "記念祭は終了しました";
        }
    }
// 1. ニュースカードの数を数えて「新着記事」に入れる

async function loadNewsFromExcel() {
    // 1. エクセルファイルを読み込む
    const response = await fetch('news_data.xlsx');
    const arrayBuffer = await response.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    const workbook = XLSX.read(data, {type: 'array'});

    // 2. 最初のシートのデータをJSON（扱いやすい形）にする
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const newsList = XLSX.utils.sheet_to_json(firstSheet);

    // 3. 画面に表示する（今のデザインに合わせて流し込む）
    renderNews(newsList);
}
