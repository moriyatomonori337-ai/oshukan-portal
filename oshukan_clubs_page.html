<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Oshukan Portal | 桜修館のいまを、もっと面白く</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.ticker{background:var(--amber-lt); ... }
.page-header{padding:36px 0 24px}
.page-header h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.page-header p{font-size:13px;color:var(--muted);line-height:1.6}
.sec-label{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.search-wrap{position:relative}
.search-input{width:100%;padding:11px 16px 11px 42px;border:2px solid var(--black);border-radius:999px;font-family:inherit;font-size:13px;font-weight:700;background:var(--white);outline:none}
.search-input:focus{border-color:var(--pink)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted)}
.tag-row{display:flex;gap:8px;flex-wrap:wrap}
.tag-btn{padding:6px 16px;border-radius:999px;border:2px solid var(--black);background:var(--white);font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;white-space:nowrap}
.tag-btn.active{background:var(--black);color:var(--white)}
.result-info{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:14px}
.clubs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:48px}
.club-card{background:var(--white);border:2px solid var(--black);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .15s}
.club-card:hover{transform:translateY(-3px)}
.club-top{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.club-cat-badge{position:absolute;top:8px;left:10px;font-size:9px;font-weight:800;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.9);border:1.5px solid currentColor}
.club-body{padding:14px}
.club-name{font-size:14px;font-weight:800;margin-bottom:4px}
.club-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.club-stats{display:flex;gap:8px;flex-wrap:wrap}
.club-stat{font-size:10px;font-weight:800;padding:2px 9px;border-radius:999px;background:var(--bg);border:1.5px solid #ddd;color:var(--black)}
.club-review{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ec}
.club-review-label{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px}
.club-review p{font-size:11px;color:var(--black);line-height:1.5;font-style:italic}
.stars{color:var(--amber);font-size:12px;margin-bottom:2px}
footer{background:var(--black);color:var(--white);padding:24px 32px;display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-size:14px;font-weight:800}
.footer-sub{font-size:11px;opacity:.5;margin-top:3px}
@media(max-width:700px){
  nav{padding:0 16px}.nav-links{display:none}
  .wrap{padding:0 16px}
  .clubs-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="wrapper">
<nav>
  <div class="nav-logo">
    <div class="logo-dots">
      <div class="logo-dot" style="background:var(--pink)"></div>
      <div class="logo-dot" style="background:var(--teal)"></div>
      <div class="logo-dot" style="background:var(--amber)"></div>
    </div>
<a href="index.html" style="text-decoration: none; color: inherit;">Oshukan Portal</a>  </div>
  <ul class="nav-links">
    <li><a href="oshukan_news_list.html">ニュース</a></li>
    <li><a href="oshukan_events_page.html">行事</a></li>
    <li><a href="oshukan_clubs_page.html"class="active">部活</a></li>
    <li><a href="oshukan_talks_page.html">講演</a></li>
    <li><a href="oshukan_about_page.html">広報部</a></li>
  </ul>
  <button class="nav-cta">お知らせ登録</button>
</nav>
<div class="wrap">
  <div class="page-header">
    <h1>部活紹介</h1>
    <p>先輩の本音レビュー付き。雰囲気・活動頻度・きつさをリアルに掲載。自分に合う部活を見つけよう。</p>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" type="text" placeholder="部活名・キーワードで検索...">
    </div>
    <div class="tag-row" id="tagRow">
      <button class="tag-btn active" data-cat="すべて">すべて</button>
      <button class="tag-btn" data-cat="運動系">⚽ 運動系</button>
      <button class="tag-btn" data-cat="文化系">🎨 文化系</button>
      <button class="tag-btn" data-cat="同好会">✨ 同好会</button>
    </div>
  </div>
  <div class="result-info" id="resultInfo"></div>
  <div class="clubs-grid" id="grid"></div>
</div>
</div>
<footer>
  <div>
    <div class="footer-logo">Oshukan Portal</div>
    <div class="footer-sub">桜修館中等教育学校 生徒会広報部 運営</div>
  </div>
</footer>
<script>
const CLUBS=[
  {name:'サッカー部',cat:'運動系',emoji:'⚽',bg:'#E8F5E9',color:'var(--teal)',members:'約30名',freq:'週5日',level:'★★★★',review:'体育会系だけど仲良し。先輩後輩の距離が近くて居心地いい。試合に出るには実力が必要だけど、練習は楽しい。',tag:'県大会常連'},
  {name:'合唱部',cat:'文化系',emoji:'🎶',bg:'var(--pink-lt)',color:'var(--pink)',members:'約40名',freq:'週4日',level:'★★★☆',review:'三大行事の合唱コンクールでクラスを引っ張れる。声楽未経験でも大丈夫。先生が丁寧に教えてくれる。',tag:'全国大会出場'},
  {name:'バスケットボール部',cat:'運動系',emoji:'🏀',bg:'#FFF3E0',color:'var(--amber)',members:'約25名',freq:'週5日',level:'★★★★',review:'練習はきついけど達成感がすごい。OB戦など独自のイベントも多くて盛り上がる。',tag:''},
  {name:'美術部',cat:'文化系',emoji:'🎨',bg:'var(--amber-lt)',color:'var(--amber)',members:'約20名',freq:'週3日',level:'★★☆☆',review:'自分のペースで制作できる。記念祭での展示が毎年好評。自由な雰囲気が好きな人に向いてる。',tag:'記念祭展示'},
  {name:'テニス部',cat:'運動系',emoji:'🎾',bg:'#E8F5E9',color:'var(--teal)',members:'約35名',freq:'週4日',level:'★★★☆',review:'初心者歓迎。コーチが来てくれる日もある。男女仲良くて楽しい雰囲気。',tag:''},
  {name:'放送・映像同好会',cat:'同好会',emoji:'🎬',bg:'#E3F2FD',color:'var(--blue)',members:'約10名',freq:'週2日',level:'★★☆☆',review:'動画編集・撮影に興味ある人が集まってる。記念祭の映像制作も担当。自由度が高くて楽しい。',tag:'新設'},
  {name:'バドミントン部',cat:'運動系',emoji:'🏸',bg:'var(--teal-lt)',color:'var(--teal)',members:'約20名',freq:'週4日',level:'★★★☆',review:'体育館が使えない日も多いけど、メンバーが明るくて楽しい。初心者でも上手くなれる環境。',tag:''},
  {name:'文芸部',cat:'文化系',emoji:'📖',bg:'var(--pink-lt)',color:'var(--pink)',members:'約15名',freq:'週2日',level:'★☆☆☆',review:'小説・詩・エッセイなど何でもOK。発表の場があって刺激になる。のんびり活動したい人向け。',tag:''},
  {name:'科学部',cat:'文化系',emoji:'🔬',bg:'#E8F5E9',color:'var(--teal)',members:'約18名',freq:'週3日',level:'★★★☆',review:'実験が好きな人には最高の場所。学校の設備を使い倒せる。理系に進みたい人にもおすすめ。',tag:''},
  {name:'ダンス同好会',cat:'同好会',emoji:'💃',bg:'var(--pink-lt)',color:'var(--pink)',members:'約12名',freq:'週2〜3日',level:'★★☆☆',review:'K-POPカバーから創作ダンスまで幅広い。記念祭のステージが最高に楽しい。未経験者大歓迎！',tag:'記念祭出演'},
  {name:'将棋・囲碁同好会',cat:'同好会',emoji:'♟️',bg:'var(--amber-lt)',color:'var(--amber)',members:'約8名',freq:'週1〜2日',level:'★☆☆☆',review:'初心者でもゆっくり楽しめる。勝負の世界に興味ある人はぜひ。先生も参加してくれることある。',tag:''},
  {name:'陸上部',cat:'運動系',emoji:'🏃',bg:'#FFF3E0',color:'var(--amber)',members:'約22名',freq:'週5日',level:'★★★★',review:'個人競技なので自分のペースで成長できる。クラスマッチの短距離・長距離で活躍できる。',tag:''},
];

let currentCat='すべて';
let currentSearch='';

function render(){
  let list=[...CLUBS];
  if(currentCat!=='すべて') list=list.filter(c=>c.cat===currentCat);
  if(currentSearch) list=list.filter(c=>c.name.includes(currentSearch)||c.review.includes(currentSearch));
  document.getElementById('resultInfo').textContent=`${list.length}件の部活・同好会`;
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted);font-weight:700">見つかりませんでした</div>`;return;}
  grid.innerHTML=list.map(c=>`
    <div class="club-card">
      <div class="club-top" style="background:${c.bg}">
        ${c.emoji}
        <span class="club-cat-badge" style="color:${c.color}">${c.cat}</span>
      </div>
      <div class="club-body">
        <div class="club-name">${c.name}${c.tag?` <span style="font-size:10px;font-weight:800;color:${c.color}">● ${c.tag}</span>`:''}</div>
        <div class="club-desc">活動頻度 ${c.freq} ／ ${c.members}</div>
        <div class="club-stats">
          <span class="club-stat">きつさ ${c.level}</span>
        </div>
        <div class="club-review">
          <div class="club-review-label">先輩レビュー</div>
          <p>「${c.review}」</p>
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('tagRow').addEventListener('click',e=>{
  const btn=e.target.closest('.tag-btn');
  if(!btn) return;
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat=btn.dataset.cat;
  render();
});
document.getElementById('search').addEventListener('input',e=>{
  currentSearch=e.target.value.trim();
  render();
});
render();
</script>
</body>
</html>
