<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事詳細 | Oshukan Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="wrapper">
        <header class="site-header">
            <div class="logo">
                <div class="logo-dots">
                    <div class="dot" style="background:#ff6b6b"></div>
                    <div class="dot" style="background:#4ecdc4"></div>
                    <div class="dot" style="background:#ffbe0b"></div>
                </div>
                Oshukan Portal
            </div>
        </header>

        <main class="container">
            <div style="margin-bottom: 20px;">
                <a href="oshukan_news_list.html" class="btn-secondary" style="text-decoration:none;">← 戻る</a>
            </div>

            <article class="news-item-detail">
                <div class="item-emoji-large" id="postEmoji">✨</div>
                
                <div class="item-content">
                    <span id="postTag" class="category-tag">読み込み中...</span>
                    <h1 id="postTitle" class="item-title-large">読み込み中...</h1>
                    
                    <div class="item-meta">
                        <span id="postDate">----/--/--</span>
                        <span id="postAuthor">執筆：広報部</span>
                    </div>

                    <hr class="separator">

                    <div id="postContent" class="item-body-text">
                        記事を読み込んでいます...
                    </div>
                </div>
            </article>
        </main>
    </div>

    <footer>
        <div class="footer-content">
            <p>Oshukan Portal</p>
            <small>桜修館中等教育学校 生徒会広報部</small>
        </div>
    </footer>

    <script>
        // エクセル読み込みロジック（ここは今のままでOK）
        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            try {
                const res = await fetch('news_data.xlsx');
                const ab = await res.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(ab), {type:'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                const article = data[id];
                if (article) {
                    document.getElementById('postTitle').innerText = article.title;
                    document.getElementById('postDate').innerText = article.date;
                    document.getElementById('postAuthor').innerText = `執筆：${article.author || '広報部'}`;
                    document.getElementById('postEmoji').innerText = article.emoji || '✨';
                    document.getElementById('postTag').innerText = article.tag || 'ニュース';
                    document.getElementById('postContent').innerText = article.content;
                    document.title = `${article.title} | Oshukan Portal`;
                }
            } catch (e) {
                console.error(e);
                document.getElementById('postContent').innerText = "エラー：記事が見つかりませんでした。";
            }
        }
        loadArticle();
    </script>
</body>
</html>
