<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V0N2P1JPRF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V0N2P1JPRF');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshukan Portal | 桜修館のいまを、もっと面白く</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* ── 一覧ページから移植した共通スタイル ── */
        :root {
            --pink: #EE7E7E; --pink-lt: #F7BFBF;
            --teal: #36ACBC; --teal-lt: #83CBEB;
            --amber: #F1AB56; --amber-lt: #F4E58C;
            --blue: #005792; --blue-lt: #4E95D9;
            --black: #1A1A1A; --white: #fff; --bg: #FAFAF8; --muted: #777;
            --radius: 14px;
        }

        /* ── 記事詳細専用のレイアウト ── */
        .container {
            max-width: 850px;
            margin: 40px auto 80px;
            padding: 0 32px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--black);
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 24px;
            padding: 8px 20px;
            border: 2px solid var(--black);
            border-radius: 999px;
            background: var(--white);
            transition: transform .15s;
        }
        .back-btn:hover { transform: translateY(-2px); }

        /* 記事カード（featuredカードのデザインをベースに作成） */
        .post-card {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .post-hero {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border-bottom: 2px solid var(--black);
            background: var(--bg); /* 動的に変わります */
        }

        .post-body {
            padding: 40px;
        }

        .post-tag {
            font-size: 11px;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 999px;
            border: 1.5px solid currentColor;
            width: fit-content;
            margin-bottom: 16px;
        }

        .post-title {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }

        .post-dot {
            width: 4px;
            height: 4px;
            background: #ccc;
            border-radius: 50%;
        }

        .post-content {
            font-size: 16px;
            line-height: 1.9;
            color: var(--black);
            white-space: pre-wrap; /* 改行を反映 */
        }

        @media(max-width: 600px) {
            .container { padding: 0 16px; margin-top: 20px; }
            .post-body { padding: 24px; }
            .post-title { font-size: 24px; }
            .post-hero { height: 180px; font-size: 60px; }
        }
    </style>
</head>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const menuBtn = document.getElementById('mobile-menu');
    const navLinks = document.querySelector('.nav-links');
    if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('is-active');
            navLinks.classList.toggle('active');
        });
    }
});
</script>
<body>

<div class="wrapper">
<nav>
  <div class="nav-logo">
    <div class="logo-dots">
      <div class="logo-dot" style="background:var(--pink)"></div>
      <div class="logo-dot" style="background:var(--teal)"></div>
      <div class="logo-dot" style="background:var(--amber)"></div>
    </div>
    <a href="index.html" style="text-decoration: none; color: inherit;">Oshukan Portal</a>
  </div>

  <div class="nav-right-group">
    <a href="index.html" class="nav-cta">お知らせ登録</a>
    <div class="menu-toggle" id="mobile-menu">
      <span></span><span></span><span></span>
    </div>
  </div>

  <ul class="nav-links">
    <li><a href="oshukan_news_list.html">ニュース</a></li>
    <li><a href="oshukan_events_page.html">行事</a></li>
    <li><a href="oshukan_clubs_page.html">部活</a></li>
    <li><a href="oshukan_talks_page.html">講演</a></li>
    <li><a href="oshukan_about_page.html">広報部</a></li>
  </ul>
</nav>

    <div class="container">
        <a href="oshukan_news_list.html" class="back-btn">← ニュース一覧へ</a>
        
        <article class="post-card">
            <div class="post-hero" id="postHero">✨</div>
            <div class="post-body">
                <div id="postTag" class="post-tag">---</div>
                <h1 id="postTitle" class="post-title">読み込み中...</h1>
                <div class="post-meta">
                    <span id="postAuthor">---</span>
                    <span class="post-dot"></span>
                    <span id="postDate">---</span>
                </div>
                <div id="postContent" class="post-content">記事を読み込んでいます...</div>
            </div>
        </article>
    </div>
</div>

<footer>
  <div>
    <div class="footer-logo">Oshukan Portal</div>
    <div class="footer-sub">桜修館中等教育学校 自治会広報部 運営</div>
  </div>
</footer>

<script>
    const TAG_CONFIG = {
        '行事': {color: 'var(--pink)', bg: 'var(--pink-lt)'},
        '講演': {color: 'var(--teal)', bg: 'var(--teal-lt)'},
        '異能発掘': {color: 'var(--amber)', bg: 'var(--amber-lt)'},
        '部活': {color: 'var(--blue)', bg: '#E6F1FB'},
        '自治': {color: 'var(--pink)', bg: 'var(--pink-lt)'},
        'スキル': {color: 'var(--teal)', bg: 'var(--teal-lt)'},
    };

    async function loadPost() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (id === null) return;

        try {
            const res = await fetch('news_data.xlsx');
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            const post = data[id];
            if (post) {
                // タグ設定の適用
                const config = TAG_CONFIG[post.tag] || {color: 'var(--muted)', bg: '#f0f0ec'};
                
                document.getElementById('postTitle').innerText = post.title;
                document.getElementById('postContent').innerText = post.content;
                document.getElementById('postAuthor').innerText = post.author || "広報部";
                document.getElementById('postDate').innerText = post.date;
                document.getElementById('postHero').innerText = post.emoji || "✨";
                document.getElementById('postHero').style.background = config.bg;
                
                const tagEl = document.getElementById('postTag');
                tagEl.innerText = post.tag || "記事";
                tagEl.style.color = config.color;

                document.title = post.title + " | Oshukan Portal";
            }
        } catch (e) {
            console.error("データの読み込みに失敗しました:", e);
        }
    }
    loadPost();
</script>
</body>
</html>
